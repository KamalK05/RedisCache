spring.application.name=RedisCache
server.port=8082
server.tomcat.threads.max=400
server.tomcat.threads.min-spare=60
server.compression.enabled=true
# Default value of 2048 is being used
server.compression.min-response-size=2048
server.compression.mime-types=application/json, application/xml,text/html,image/jpeg
server.forward-headers-strategy=none
# do not return stacktrace to client when error
server.error.include-stacktrace=never

spring.messages.fallback-to-system-locale=false



# Redis configuration
spring.data.redis.host=localhost
spring.data.redis.port=6379
#spring.data.redis.password=

# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/users?autoReconnect=true&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
